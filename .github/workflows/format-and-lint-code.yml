name: 'Format and lint code'

on: push

jobs:
  format:
    name: Format code
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@v1.8.1
        with:
          app-id: ${{ secrets.CONTINUOUS_INTEGRATION_BOT_ID }}
          private-key: ${{ secrets.CONTINUOUS_INTEGRATION_BOT_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Format code with Prettier
        run: node --run format

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff-index --quiet HEAD || git commit -m "ci: format code"
          git push

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@v1.8.1
        with:
          app-id: ${{ secrets.CONTINUOUS_INTEGRATION_BOT_ID }}
          private-key: ${{ secrets.CONTINUOUS_INTEGRATION_BOT_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint code with ESLint
        run: node --run lint

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff-index --quiet HEAD || git commit -m "ci: lint code"
          git push
